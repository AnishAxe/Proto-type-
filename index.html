<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nothin | Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100&family=Inter:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --accent: #fff; --gray: #111; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--accent); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        #loader { text-align: center; }
        #typing { font-family: 'JetBrains Mono', monospace; font-size: 1rem; letter-spacing: 8px; border-right: 1px solid #fff; white-space: nowrap; overflow: hidden; width: 0; animation: type 0.8s steps(7) forwards, blink 0.5s infinite; }
        @keyframes type { from { width: 0 } to { width: 120px } }
        @keyframes blink { 50% { border-color: transparent } }

        .auth-card { width: 320px; text-align: center; display: none; }
        input { width: 100%; background: var(--gray); border: 1px solid #222; padding: 15px; color: #fff; margin-bottom: 10px; outline: none; font-size: 0.8rem; border-radius: 4px; }
        .btn { width: 100%; padding: 15px; background: #fff; color: #000; border: none; cursor: pointer; font-weight: 600; margin-top: 10px; border-radius: 4px; }
        .toggle { font-size: 0.7rem; color: #555; margin-top: 20px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="loader"><h1 id="typing">nothin</h1></div>

    <div class="auth-card" id="authUI">
        <h2 style="font-weight: 200; margin-bottom: 40px; letter-spacing: 5px;">AUTHENTICATE</h2>
        <input type="email" id="email" placeholder="EMAIL">
        <input type="password" id="password" placeholder="PASSWORD">
        <button class="btn" id="loginBtn">SIGN IN</button>
        <p class="toggle" id="toggleBtn">Create Account</p>
    </div>

    <script type="module">
        // If you have Firebase, paste config here. If not, it will default to manual login.
        const loader = document.getElementById('loader');
        const authUI = document.getElementById('authUI');

        window.onload = () => {
            setTimeout(() => {
                // Simulate checking login status
                const isLoggedIn = localStorage.getItem('isLoggedIn');
                if(isLoggedIn === 'true') {
                    window.location.href = 'product.html';
                } else {
                    loader.style.display = 'none';
                    authUI.style.display = 'block';
                }
            }, 2000);
        };

        document.getElementById('loginBtn').onclick = () => {
            localStorage.setItem('isLoggedIn', 'true');
            window.location.href = 'product.html';
        };
    </script>
</body>
</html>
